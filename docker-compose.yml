version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-assets
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: asset_management
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: api-assets
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: asset_management
      JWT_SECRET: segredo_super_secreto_123
      JWT_EXPIRES_IN: 24h
      PORT: 3000
    depends_on:
      - mysql

volumes:
  mysql_data: